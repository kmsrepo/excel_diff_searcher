name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Zip single HTML artifact
        run: |
          cd dist
          zip -9 ../excel-diff-searcher.zip index.html
      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: excel-diff-searcher.zip
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: excel-diff-searcher
          path: excel-diff-searcher.zip
